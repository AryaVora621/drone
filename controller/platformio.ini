[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -include Arduino.h
    ; BleNUS.cpp in the gamepad lib forgets to #include <Arduino.h>,
    ; so force-include it everywhere. This also transitively pulls in
    ; stdlib_noniso.h (dtostrf/ultoa/ltoa declarations).
lib_deps =
    lemmingDev/ESP32-BLE-Gamepad @ ^0.7.3
    ; NimBLE-Arduino is pulled in automatically as a dependency of the
    ; gamepad library. Do NOT list it here too -- that double-links it
    ; (duplicate symbol errors at link time).
monitor_speed = 115200
; Controller board is the non-drone serial port (see README). Do NOT point this at
; /dev/cu.usbserial-0001 -- that is the drone running main.py.
upload_port = /dev/cu.SLAB_USBtoUART
build_src_filter = +<*> -<main_espnow.cpp> -<diag.cpp>

; ESP-NOW TX build for the drone link (esp-fc side), separate from the BLE
; gamepad env above. Same WROOM-32U board, different firmware -- only one
; can be flashed at a time. Targets espnow-rclink, the protocol esp-fc's
; InputEspNow driver expects natively (see esp-fc/lib/Espfc/src/Device/InputEspNow.*).
[env:esp32u_espnow]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    yoursunny/WifiEspNow @ ^0.0.20230713
    https://github.com/rtlopez/espnow-rclink/archive/refs/tags/v0.1.1.zip
monitor_speed = 115200
; Fill in once the WROOM-32U is plugged in (ls /dev/cu.* before/after).
upload_port = /dev/cu.SLAB_USBtoUART
build_src_filter = +<*> -<main.cpp> -<diag.cpp>
